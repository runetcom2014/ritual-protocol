<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RITUAL</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#252b3a;--surface:#2e3648;--border:#404d66;--border2:#4d5c78;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.09);--gold-glow:rgba(201,168,76,0.2);
  --text:#e8dcc8;--text2:#b8a480;--muted:#706050;
  --accent:#b4885a;
  --mono:'Share Tech Mono',monospace;--serif:'Cinzel',serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;height:100vh;overflow:hidden}
.screen{position:absolute;inset:0;display:none;opacity:0;transition:opacity .5s ease}
.screen.active{display:flex}.screen.visible{opacity:1}
#screenStart{flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
#screenStart::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(201,168,76,.04) 0%,transparent 70%);pointer-events:none}
.start-sigil{width:110px;height:110px;margin-bottom:44px;animation:sigilPulse 4s ease-in-out infinite}
@keyframes sigilPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.65;transform:scale(1.02)}}
.start-title{font-family:var(--serif);font-size:44px;font-weight:400;letter-spacing:.45em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;text-shadow:0 0 40px rgba(201,168,76,.25)}
.start-sub{font-size:10px;letter-spacing:.3em;color:var(--text2);text-transform:uppercase;margin-bottom:60px}
.btn-start{font-family:var(--serif);font-size:12px;letter-spacing:.45em;text-transform:uppercase;padding:15px 52px;border:1px solid rgba(201,168,76,.6);background:transparent;color:var(--gold);cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.btn-start::before{content:'';position:absolute;inset:0;background:var(--gold-dim);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
.btn-start:hover::before{transform:scaleX(1)}.btn-start:hover{box-shadow:0 0 30px var(--gold-glow)}
#screenMain{flex-direction:row}
.panel-work{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.work-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--surface);flex-shrink:0}
.work-logo{font-family:var(--serif);font-size:13px;letter-spacing:.3em;color:var(--gold);opacity:.7}
.work-step{font-size:10px;letter-spacing:.2em;color:var(--text2);text-transform:uppercase;margin-left:auto}
.work-body{flex:1;overflow:hidden;padding:24px 32px;display:flex;flex-direction:column}
.frame{animation:frameIn .3s ease;display:flex;flex-direction:column;flex:1;min-height:0}
@keyframes frameIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.frame-label{font-size:10px;letter-spacing:.25em;color:var(--text2);text-transform:uppercase;margin-bottom:24px}
.choose-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.choose-btn{padding:22px 16px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;transition:all .2s;text-align:left;position:relative;overflow:hidden}
.choose-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .25s ease}
.choose-btn:hover{background:rgba(201,168,76,.03)}.choose-btn:hover::after{transform:scaleX(1)}
.choose-btn-name{font-family:var(--serif);font-size:11px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.choose-btn-desc{font-size:10px;color:var(--text2);line-height:1.7}
.btn-fin{font-family:var(--serif);font-size:11px;letter-spacing:.35em;text-transform:uppercase;padding:14px 28px;border:1px solid rgba(201,168,76,.35);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;width:100%;margin-top:4px}
.btn-fin:hover{background:var(--gold-dim);box-shadow:0 0 20px var(--gold-glow)}.btn-fin:disabled{opacity:.2;cursor:not-allowed}
.perform-type-label{font-family:var(--serif);font-size:18px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-bottom:16px;flex-shrink:0}
.seq-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
.rite-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:16px;padding:12px 0;outline:none;letter-spacing:.04em;transition:border-color .2s;margin-bottom:6px}
.rite-input:focus{border-bottom-color:var(--gold)}.rite-input::placeholder{color:var(--muted)}
.seq-chosen{display:flex;flex-wrap:wrap;gap:5px;min-height:38px;padding:6px;border:1px solid var(--border2);margin-bottom:10px;background:var(--surface)}
.seq-chip{font-size:17px;padding:3px 5px;background:var(--gold-dim);border:1px solid rgba(201,168,76,.12);cursor:pointer;transition:all .1s;animation:popIn .12s ease}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.seq-chip:hover{background:rgba(139,32,32,.12);border-color:rgba(139,32,32,.25)}
.seq-symbols{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:6px;flex:1;min-height:0;margin-bottom:10px}
.seq-sym{background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:min(4vw,4vh);transition:all .1s;min-height:0}
.seq-sym:hover{border-color:rgba(201,168,76,.4);background:var(--gold-dim)}
.const-wrap{display:flex;flex-direction:column;flex:1;min-height:0;gap:8px}
.const-controls{display:flex;align-items:center;gap:12px;flex-shrink:0}
.const-step{font-size:11px;color:var(--text2);letter-spacing:.15em;flex:1;text-align:center}
.btn-rot{font-family:var(--mono);font-size:11px;padding:7px 14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-rot:hover{border-color:var(--gold);color:var(--gold)}
.const-sky-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
.const-sky{width:100%;height:100%;max-width:100%;max-height:100%}
.star-dot{cursor:pointer;transition:r .15s}
.star-dot:hover{filter:drop-shadow(0 0 4px #c9a84c)}
.star-selected{fill:#c9a84c !important}
.const-path{font-size:10px;color:var(--text2);letter-spacing:.1em;flex-shrink:0;min-height:16px}
.file-drop{border:1px dashed var(--border2);padding:30px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:10px}
.file-drop:hover,.file-drop.dragover{border-color:rgba(201,168,76,.35);background:var(--gold-dim)}
.file-drop-text{font-size:11px;color:var(--text2);letter-spacing:.1em;line-height:1.9}
.file-loaded{font-size:11px;color:var(--gold);margin-top:6px}
.file-wrap{display:flex;flex-direction:column;gap:10px}
.file-params{display:flex;flex-direction:column;gap:8px}
.file-param-row{display:flex;align-items:center;gap:10px}
.file-param-label{font-size:10px;color:var(--muted);letter-spacing:.15em;width:52px;flex-shrink:0}
.file-param-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 10px;outline:none}
.file-param-input:focus{border-color:var(--gold)}
.rg-wrap{display:flex;gap:18px;flex:1;min-height:0}
.rg-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:6px;flex:2;min-height:0;user-select:none;-webkit-user-select:none}
.rg-cell{border:1px solid rgba(221,208,184,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s;background:rgba(255,255,255,0.03);container-type:size;min-height:0;user-select:none;-webkit-user-select:none}
.rg-cell:hover{border-color:rgba(221,208,184,0.5);background:rgba(255,255,255,0.07)}
.rg-cell-filled{border-color:var(--accent);background:rgba(180,140,80,0.1)}
.rg-cell span{font-size:80cqmin;user-select:none;-webkit-user-select:none;pointer-events:none}
.rg-runes-wrap{flex:1;display:flex;flex-direction:column;min-height:0;user-select:none;-webkit-user-select:none}
.rg-runes{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(8,1fr);gap:5px;flex:1;min-height:0}
.rg-rune{border:1px solid rgba(221,208,184,0.15);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:grab;transition:border-color .15s,background .15s;user-select:none;-webkit-user-select:none;container-type:size;min-height:0}
.rg-rune span{font-size:70cqmin;user-select:none;-webkit-user-select:none;pointer-events:none}
.rg-rune:hover{border-color:rgba(221,208,184,0.4);background:rgba(255,255,255,0.05)}
.rg-rune-selected{border-color:var(--accent);background:rgba(180,140,80,0.15)}
.rg-rune:hover{border-color:rgba(221,208,184,0.4);background:rgba(255,255,255,0.05)}
.rg-rune-selected{border-color:var(--accent);background:rgba(180,140,80,0.15)}
.ct-wrap{display:flex;flex-direction:column;gap:10px}
.ct-search-wrap{position:relative}
.ct-dropdown{display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-top:none;max-height:180px;overflow-y:auto;border-radius:0 0 6px 6px}
.ct-opt{padding:7px 12px;cursor:pointer;font-size:13px;color:var(--text)}
.ct-opt:hover{background:var(--border)}
.ct-city-chosen{font-size:14px;color:var(--gold);font-weight:600;min-height:20px;padding:2px 0}
.ct-drums{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;user-select:none}
.ct-drum-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.ct-drum-label{font-size:10px;color:var(--muted);letter-spacing:.15em}
.ct-drum-sep{font-size:28px;color:var(--text2);margin-bottom:18px;align-self:center}
.ct-drum{height:108px;overflow:hidden;position:relative;width:56px;cursor:ns-resize}
.ct-drum::before,.ct-drum::after{content:'';position:absolute;left:0;right:0;height:36px;z-index:2;pointer-events:none}
.ct-drum::before{top:0;background:linear-gradient(to bottom,var(--bg),transparent)}
.ct-drum::after{bottom:0;background:linear-gradient(to top,var(--bg),transparent)}
.ct-drum-item{height:36px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;transition:all .15s;color:var(--muted);cursor:pointer}
.ct-drum-item.ct-drum-active{color:var(--gold);font-size:26px;text-shadow:0 0 12px var(--gold-glow)}
.ct-drum-item.ct-drum-near{color:var(--text2);font-size:18px}
.ct-drum-item.ct-drum-far{color:var(--border);font-size:14px}
.entropy-mini{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--border);margin-top:10px;flex-shrink:0}
.perform-actions{display:flex;gap:8px;margin-top:10px;flex-shrink:0}
.entropy-mini-bar{flex:1;height:1px;background:var(--border2);position:relative}
.entropy-mini-label{font-size:10px;color:var(--text2);letter-spacing:.1em;flex-shrink:0}
.entropy-mini-fill{position:absolute;left:0;top:0;bottom:0;height:1px;transition:width .4s ease,background .4s ease}
.entropy-mini-val{font-size:10px;color:var(--text2);min-width:50px;text-align:right;transition:color .3s}
.btn-back{font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:12px 18px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.btn-back:hover{border-color:var(--text2);color:var(--text)}
.btn-perform{font-family:var(--serif);font-size:11px;letter-spacing:.3em;text-transform:uppercase;padding:12px 28px;border:1px solid rgba(201,168,76,.45);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;flex:1}
.btn-perform:hover{background:var(--gold-dim);box-shadow:0 0 18px var(--gold-glow)}.btn-perform:disabled{opacity:.2;cursor:not-allowed}
.complete-frame{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding-top:40px}
.panel-summary{width:288px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.summary-section{padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.summary-label{font-size:10px;letter-spacing:.22em;color:var(--text2);text-transform:uppercase;margin-bottom:14px}
.entropy-big{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.entropy-num{font-family:var(--serif);font-size:38px;font-weight:400;line-height:1;transition:color .4s;color:var(--text2)}
.entropy-unit{font-size:11px;letter-spacing:.12em;color:var(--text2);text-transform:uppercase}
.entropy-verdict{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text2);margin-left:auto;transition:color .4s}
.entropy-track{height:2px;background:var(--border2);margin-bottom:10px}
.entropy-track-fill{height:100%;transition:width .5s ease,background .5s ease;width:0%}
.entropy-pills{display:flex;gap:3px}
.epill{flex:1;height:2px;background:var(--border);transition:background .3s}
.rites-scroll{flex:1;overflow-y:auto;padding:16px 20px}
.rite-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);animation:frameIn .25s ease}
.rite-row-n{font-size:10px;color:var(--muted);width:18px;flex-shrink:0}
.rite-row-type{font-family:var(--serif);font-size:11px;letter-spacing:.15em;color:var(--gold);flex:1}
.rite-row-bits{font-size:10px;color:var(--text2)}
.rite-row-del{font-size:10px;color:var(--muted);cursor:pointer;padding:2px 4px;transition:color .15s;flex-shrink:0}
.rite-row-del:hover{color:#c05050}
.rites-empty{font-size:11px;color:var(--muted);font-style:italic}
.key-section{padding:16px 20px;border-top:1px solid var(--border);display:none;flex-shrink:0}
.key-label{font-size:10px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:.7}
.key-hex{font-size:10px;color:var(--gold);word-break:break-all;line-height:2;letter-spacing:.06em}
.btn-copy{margin-top:10px;width:100%;font-family:var(--mono);font-size:10px;letter-spacing:.14em;padding:8px;border:1px solid rgba(201,168,76,.22);background:transparent;color:var(--gold);cursor:pointer;transition:all .15s;text-transform:uppercase}
.btn-copy:hover{background:var(--gold-dim)}
.btn-reset-wrap{padding:12px 20px;flex-shrink:0}
.btn-reset{width:100%;font-family:var(--mono);font-size:10px;letter-spacing:.14em;padding:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;text-transform:uppercase}
.btn-reset:hover{border-color:#8b2020;color:#c05050}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--gold);color:var(--bg);font-family:var(--mono);font-size:11px;letter-spacing:.14em;padding:9px 20px;opacity:0;transition:all .25s;pointer-events:none;z-index:100;text-transform:uppercase}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2)}
</style>
</head>
<body>

<div class="screen active" id="screenStart">
  <svg class="start-sigil" viewBox="0 0 120 120" fill="none">
    <circle cx="60" cy="60" r="55" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="4 7"/>
    <circle cx="60" cy="60" r="36" stroke="#c9a84c" stroke-width="0.3" stroke-dasharray="2 9"/>
    <polygon points="60,8 112,89 8,89"   stroke="#c9a84c" stroke-width="0.5" fill="none"/>
    <polygon points="60,112 8,31 112,31" stroke="#c9a84c" stroke-width="0.5" fill="none"/>
    <circle cx="60"  cy="60"  r="3.5" fill="#c9a84c" opacity="0.7"/>
    <circle cx="60"  cy="8"   r="1.8" fill="#c9a84c" opacity="0.35"/>
    <circle cx="112" cy="89"  r="1.8" fill="#c9a84c" opacity="0.35"/>
    <circle cx="8"   cy="89"  r="1.8" fill="#c9a84c" opacity="0.35"/>
    <circle cx="60"  cy="112" r="1.8" fill="#c9a84c" opacity="0.35"/>
    <circle cx="8"   cy="31"  r="1.8" fill="#c9a84c" opacity="0.35"/>
    <circle cx="112" cy="31"  r="1.8" fill="#c9a84c" opacity="0.35"/>
  </svg>
  <div class="start-title">Ritual</div>
  <div class="start-sub">Key Derivation Protocol · v1</div>
  <button class="btn-start" onclick="startRitual()">Begin</button>
</div>

<div class="screen" id="screenMain">
  <div class="panel-work">
    <div class="work-header">
      <div class="work-logo">◈ Ritual</div>
      <div class="work-step" id="workStep">Choose a rite</div>
    </div>
    <div class="work-body" id="workBody"></div>
  </div>

  <div class="panel-summary">
    <div class="summary-section">
      <div class="summary-label">// Entropy</div>
      <div class="entropy-big">
        <span class="entropy-num" id="entropyNum">0</span>
        <span class="entropy-unit">bits</span>
        <span class="entropy-verdict" id="entropyVerdict">—</span>
      </div>
      <div class="entropy-track"><div class="entropy-track-fill" id="entropyFill"></div></div>
      <div class="entropy-pills">
        <div class="epill" id="ep0"></div>
        <div class="epill" id="ep1"></div>
        <div class="epill" id="ep2"></div>
        <div class="epill" id="ep3"></div>
      </div>
    </div>

    <div class="rites-scroll" id="ritesList">
      <div class="summary-label">// Completed rites</div>
      <div class="rites-empty" id="ritesEmpty">No rites performed yet</div>
    </div>

    <div class="key-section" id="keySection">
      <div class="key-label">◈ Derived Key · 256 bit</div>
      <div class="key-hex" id="keyHex"></div>
      <button class="btn-copy" onclick="copyKey()">Copy to clipboard</button>
    </div>

    <div class="key-section" id="keygenSection" style="display:none">
      <div class="key-label">◈ Derived Key Files</div>
      <div id="keygenLinks" style="display:flex;flex-direction:column;gap:6px;margin-top:4px"></div>
    </div>

    <div class="btn-reset-wrap">
      <button class="btn-reset" onclick="resetAll()">↺ Reset ritual</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TYPE_IDS = {string:"STRING",sequence:"SEQUENCE",file:"FILE",constellation:"CONSTELLATION",citytime:"CITYTIME",runegrid:"RUNEGRID"};
const TYPE_EBITS = Math.log2(4);

let SEQ_SYMBOLS = [];  // names
let SEQ_EMOJI   = {};  // name → emoji
let SEQ_SVG     = {};  // name → svg

async function initRiteData(){
  const raw = await window.ritualGetRiteData(TYPE_IDS.sequence);
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;
  SEQ_SYMBOLS = d.symbols;
  SEQ_EMOJI   = d.emoji;
  SEQ_SVG     = d.svg || {};
}

function seqSymLabel(name){
  if(SEQ_SVG[name])   return `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${SEQ_SVG[name]}</span>`;
  if(SEQ_EMOJI[name]) return SEQ_EMOJI[name];
  return `<span style="font-size:9px;letter-spacing:0;">${name}</span>`;
}

let completedRites=[], totalBits=0, finalKey=null;
let cur={riteId:null,type:null,payload:null,seqArr:[],editingIndex:null,rotation:0,starPath:[]};

function startRitual(){
  const s=document.getElementById('screenStart'),m=document.getElementById('screenMain');
  s.classList.remove('visible');
  setTimeout(()=>{s.classList.remove('active');m.classList.add('active');setTimeout(()=>m.classList.add('visible'),20);},500);
  goReset().then(()=>initRiteData()).then(()=>showChoose());
}

function showChoose(){
  cur={riteId:null,type:null,payload:null,seqArr:[],editingIndex:null};
  const n=completedRites.length;
  setStep(n===0?'Choose a rite':'Add another rite');
  wb().innerHTML=`<div class="frame">
    <div class="frame-label">// Select rite type</div>
    <div class="choose-grid">
      <div class="choose-btn" onclick="showPerform('string')">
        <div class="choose-btn-name">String</div>
        <div class="choose-btn-desc">A phrase, word or secret text</div>
      </div>
      <div class="choose-btn" onclick="showPerform('sequence')">
        <div class="choose-btn-name">Sequence</div>
        <div class="choose-btn-desc">Ordered pattern of symbols</div>
      </div>
      <div class="choose-btn" onclick="showPerform('file')">
        <div class="choose-btn-name">File</div>
        <div class="choose-btn-desc">A specific file as a factor</div>
      </div>
      <div class="choose-btn" onclick="showPerform('constellation')">
        <div class="choose-btn-name">Constellation</div>
        <div class="choose-btn-desc">Align the sky and trace a path</div>
      </div>
      <div class="choose-btn" onclick="showPerform('citytime')">
        <div class="choose-btn-name">City &amp; Time</div>
        <div class="choose-btn-desc">A place and a moment in time</div>
      </div>
      <div class="choose-btn" onclick="showPerform('runegrid')">
        <div class="choose-btn-name">Rune Grid</div>
        <div class="choose-btn-desc">Place ancient runes upon the field</div>
      </div>
    </div>
    <button class="btn-fin" ${n>0?'':'disabled'} onclick="doFinalize()">◈ &nbsp; Finalize Ritual</button>
  </div>`;
}

function showPerform(type, editIndex=null){
  cur.type=type;
  cur.editingIndex=editIndex;

  if(editIndex !== null){
    const existing=completedRites[editIndex];
    cur.riteId=existing.id;
    cur.seqArr=[];
    setStep(`Edit rite ${editIndex+1} — ${type.toUpperCase()}`);
  } else {
    cur.riteId=null; cur.seqArr=[];
    curFilePath = null;
    setStep(`Rite ${completedRites.length+1} — ${type.toUpperCase()}`);
  }

  wb().innerHTML=`<div class="frame">
    <div class="perform-type-label">${type.charAt(0).toUpperCase()+type.slice(1)}</div>
    ${inputHtml(type, editIndex)}
    <div class="entropy-mini">
      <span class="entropy-mini-label">entropy</span>
      <div class="entropy-mini-bar"><div class="entropy-mini-fill" id="miniFill"></div></div>
      <span class="entropy-mini-val" id="miniVal">—</span>
    </div>

      <button class="btn-back" onclick="cancelPerform()">← Back</button>
      <button class="btn-perform" id="btnPerform" ${editIndex!==null?'':'disabled'} onclick="doPerform()">
        ${editIndex!==null ? 'Update →' : 'Perform →'}
      </button>
    </div>
  </div>`;

  if(type==='string') initString(editIndex);
  if(type==='sequence') initSequence(editIndex);
  if(type==='file') initFile(editIndex);

  if(type==='citytime') initCityTime(editIndex);
  if(type==='runegrid') initRuneGrid(editIndex);

async function cancelPerform(){

  showChoose();
}

// --- CONSTELLATION ---

const CONST_STEPS = 18;

// Star visual mapping — local rendering hints
const STAR_RADIUS = {small: 1.8, medium: 2.6, large: 3.6};
const STAR_COLOR  = {
  blue:   '#a8d0ff',
  white:  '#f0f5ff',
  yellow: '#ffe890',
  orange: '#ffaa66',
  red:    '#ff7744',
};

let CONST_BASE_STARS = []; // loaded from Go on first use

async function ensureStars(){
  if(CONST_BASE_STARS.length > 0) return;
  const rd = parse(await window.ritualGetRiteData(TYPE_IDS.constellation));
  CONST_BASE_STARS = rd.stars.map(s=>([
    s.x, s.y,
    STAR_RADIUS[s.size] || 2.4,
    STAR_COLOR[s.color] || '#f0f5ff',
    s.name
  ]));
}

function starsAt(step){
  const angle = step * (2 * Math.PI / CONST_STEPS);
  const cos = Math.cos(angle), sin = Math.sin(angle);
  return CONST_BASE_STARS.map(([x,y,r,color,name])=>{
    const dx=x-0.5, dy=y-0.5;
    return [0.5+dx*cos-dy*sin, 0.5+dx*sin+dy*cos, r, color, name];
  });
}

function renderSky(){
  const stars = starsAt(cur.rotation);
  const sg = document.getElementById('skyStars');
  const pg = document.getElementById('skyPath');
  if(!sg) return;

  // draw stars
  sg.innerHTML = stars.map(([x,y,r,color,name],i)=>{
    const cx = x*400, cy = y*400;
    const selected = cur.starPath.includes(i);
    const order = cur.starPath.indexOf(i);
    // glow effect via two circles
    const glowR = r * 2.2;
    const glowColor = selected ? 'rgba(201,168,76,0.35)' : color.replace('#','') === color ? color : hexToRgba(color, 0.25);
    return `
      <circle cx="${cx}" cy="${cy}" r="${glowR}" fill="${selected?'rgba(201,168,76,0.2)':hexToRgba(color,0.18)}"/>
      <circle class="star-dot${selected?' star-selected':''}"
        cx="${cx}" cy="${cy}" r="${selected ? r*1.4 : r}"
        fill="${selected ? '#c9a84c' : color}"
        opacity="${selected ? 1 : 0.9}"/>
      <circle cx="${cx}" cy="${cy}" r="${Math.max(r*3.5, 14)}"
        fill="transparent" onclick="starClick(${i})" style="cursor:pointer">
        <title>${name}</title>
      </circle>
      ${selected && order>=0 ? `<text x="${cx+r+4}" y="${cy-r}" font-size="9" fill="#c9a84c" opacity="0.8">${order+1}</text>` : ''}`;
  }).join('');

  // draw path lines
  if(cur.starPath.length > 1){
    const pts = cur.starPath.map(i=>{
      const [x,y] = stars[i];
      return `${x*400},${y*400}`;
    });
    pg.innerHTML = `<polyline points="${pts.join(' ')}" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.45"/>`;
  } else {
    pg.innerHTML = '';
  }

  // update step label
  const deg = cur.rotation * 20;
  const el = document.getElementById('constStep');
  if(el) el.textContent = deg + '°';

  // update path display
  const cp = document.getElementById('constPath');
  if(cp) cp.textContent = cur.starPath.length
    ? 'Path: ' + cur.starPath.map(i=>stars[i][4]).join(' → ')
    : '—';
}

function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

async function rotatesky(dir){
  cur.rotation = ((cur.rotation + dir) + CONST_STEPS) % CONST_STEPS;
  renderSky();
  if(!cur.riteId) cur.riteId = await goAddRite(TYPE_IDS.constellation);
  const r = await goUpdateRite(cur.riteId, [cur.rotation, Array.from(cur.starPath)]);
  if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
}

async function starClick(idx){
  const pos = cur.starPath.indexOf(idx);
  if(pos >= 0){
    cur.starPath.splice(pos, 1); // deselect
  } else {
    cur.starPath.push(idx);
  }
  renderSky();
  document.getElementById('btnPerform').disabled = cur.starPath.length === 0;

  if(!cur.riteId) cur.riteId = await goAddRite(TYPE_IDS.constellation);
  const r = await goUpdateRite(cur.riteId, [cur.rotation, Array.from(cur.starPath)]);
  if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
}

async function initConstellation(editIndex){
  await ensureStars();
  if(editIndex !== null){
    const payload = await goGetRitePayload(completedRites[editIndex].id);
    cur.rotation = payload ? payload[0] : 0;
    cur.starPath = payload && payload[1] ? [...payload[1]] : [];
  } else {
    cur.rotation = Math.floor(Math.random() * CONST_STEPS);
    cur.starPath = [];
  }
  setTimeout(async ()=>{
    renderSky();
    if(!cur.riteId) cur.riteId = await goAddRite(TYPE_IDS.constellation);
    const r = await goUpdateRite(cur.riteId, [cur.rotation, Array.from(cur.starPath)]);
    if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
    document.getElementById('btnPerform').disabled = cur.starPath.length === 0;
  }, 0);
}


// --- RUNEGRID ---

let RG_RUNES = [];      // from Go: array of rune glyphs
let rgGrid   = [];      // 9 cells: null or {runeIdx, glyph}
let rgDragging = null;  // {runeIdx, glyph, fromCell} or null

async function initRuneGrid(editIndex){
  if(RG_RUNES.length === 0){
    const rd = parse(await window.ritualGetRiteData(TYPE_IDS.runegrid));
    RG_RUNES = rd.runes;
  }
  rgGrid = Array(9).fill(null);
  rgDragging = null;
  if(editIndex !== null){
    const payload = await goGetRitePayload(completedRites[editIndex].id);
    if(payload) payload.forEach(([cell,ri])=>{ rgGrid[cell]={runeIdx:ri,glyph:RG_RUNES[ri]}; });
  }
  setTimeout(()=>{ renderRuneGrid(); rgCheckPerform(); }, 0);
  if(editIndex !== null) await showExistingEntropy(completedRites[editIndex].id);
}

function renderRuneGrid(){
  const wrap = document.getElementById('rgGrid')?.parentElement;
  const grid = document.getElementById('rgGrid');
  const pal  = document.getElementById('rgRunes');
  if(!grid || !pal) return;

  // render palette first so it has width
  pal.innerHTML = RG_RUNES.map((g,i)=>
    `<div class="rg-rune" draggable="true" data-rune="${i}"
      ondragstart="rgDragStart(event,${i})"
      onclick="rgRuneClick(${i})"
    ><span>${g}</span></div>`
  ).join('');

  // render grid cells
  for(let i=0;i<9;i++){
    const el = document.getElementById(`rgCell${i}`);
    if(!el) continue;
    const r = rgGrid[i];
    el.innerHTML = r ? `<span>${r.glyph}</span>` : '';
    el.classList.toggle('rg-cell-filled', !!r);
  }

}


function rgDragStart(e, runeIdx){
  rgDragging = {runeIdx, glyph: RG_RUNES[runeIdx], fromCell: null};
  e.dataTransfer.effectAllowed = 'move';
}

function rgCellDragStart(e, cell){
  const r = rgGrid[cell];
  if(!r) return;
  rgDragging = {runeIdx: r.runeIdx, glyph: r.glyph, fromCell: cell};
  e.dataTransfer.effectAllowed = 'move';
}

function rgDrop(e, cell){
  e.preventDefault();
  if(!rgDragging) return;
  // if cell occupied — swap or return old rune to palette
  if(rgGrid[cell] && rgDragging.fromCell !== null){
    // swap
    const tmp = rgGrid[cell];
    rgGrid[cell] = {runeIdx: rgDragging.runeIdx, glyph: rgDragging.glyph};
    rgGrid[rgDragging.fromCell] = tmp;
  } else {
    if(rgDragging.fromCell !== null) rgGrid[rgDragging.fromCell] = null;
    rgGrid[cell] = {runeIdx: rgDragging.runeIdx, glyph: rgDragging.glyph};
  }
  rgDragging = null;
  renderRuneGrid();
  rgSendToGo();
}

let rgSelectedRune = null;

function rgRuneClick(runeIdx){
  rgSelectedRune = runeIdx;
  document.querySelectorAll('.rg-rune').forEach(el=>{
    el.classList.toggle('rg-rune-selected', parseInt(el.dataset.rune)===runeIdx);
  });
}

function rgCellClick(cell){
  if(rgGrid[cell]){
    // remove rune
    rgGrid[cell] = null;
    renderRuneGrid();
    rgSendToGo();
  } else if(rgSelectedRune !== null){
    // place selected rune
    rgGrid[cell] = {runeIdx: rgSelectedRune, glyph: RG_RUNES[rgSelectedRune]};
    rgSelectedRune = null;
    renderRuneGrid();
    rgSendToGo();
  }
}

function rgCheckPerform(){
  const count = rgGrid.filter(Boolean).length;
  document.getElementById('btnPerform').disabled = count < 1;
}

async function rgSendToGo(){
  const placements = [];
  rgGrid.forEach((r,i)=>{ if(r) placements.push([i, r.runeIdx]); });
  if(placements.length === 0) return;
  if(!cur.riteId) cur.riteId = await goAddRite(TYPE_IDS.runegrid);
  const r = await goUpdateRite(cur.riteId, placements);
  if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
  rgCheckPerform();
}



let CT_CITIES = [];
let ctCity = null;   // selected city string
let ctHHMM = null;   // selected time as number e.g. 1430

async function initCityTime(editIndex){
  if(CT_CITIES.length === 0){
    const rd = parse(await window.ritualGetRiteData(TYPE_IDS.citytime));
    CT_CITIES = rd.cities;
  }
  ctCity = null;
  drumH = new Date().getHours();
  drumM = new Date().getMinutes();
  if(editIndex !== null){
    const payload = await goGetRitePayload(completedRites[editIndex].id);
    if(payload && payload[0]) ctCity = payload[0];
    if(payload && payload[1] != null){ drumH = Math.floor(payload[1]/100); drumM = payload[1] % 100; }
  }
  ctHHMM = drumH * 100 + drumM;
  setTimeout(()=>{
    const inp = document.getElementById('ctCityIn');
    const chosen = document.getElementById('ctCityChosen');
    if(ctCity && inp){ inp.value = ctCity; if(chosen) chosen.textContent = ctCity; }
    renderDrums();
    document.getElementById('btnPerform').disabled = !ctCity;
    if(ctCity) ctUpdate();
  }, 0);
  if(editIndex !== null) await showExistingEntropy(completedRites[editIndex].id);
}

function ctFilter(q){
  const dd = document.getElementById('ctDropdown');
  if(!dd) return;
  if(q.length < 1){ dd.style.display='none'; return; }
  const results = CT_CITIES.filter(c => c.toLowerCase().startsWith(q.toLowerCase())).slice(0,50);
  dd.innerHTML = results.map(c =>
    `<div class="ct-opt" onclick="ctSelect('${c.replace(/'/g,"\\'")}')">${c}</div>`
  ).join('');
  dd.style.display = results.length ? 'block' : 'none';
}

async function ctSelect(city){
  ctCity = city;
  const inp = document.getElementById('ctCityIn');
  const chosen = document.getElementById('ctCityChosen');
  const dd = document.getElementById('ctDropdown');
  if(inp) inp.value = city;
  if(chosen) chosen.textContent = city;
  if(dd) dd.style.display = 'none';
  await ctUpdate();
}

let drumH = 12, drumM = 0;

function drumScroll(e, which){
  e.preventDefault();
  const dir = e.deltaY > 0 ? 1 : -1;
  if(which === 'H') drumH = (drumH + dir + 24) % 24;
  else              drumM = (drumM + dir + 60) % 60;
  renderDrums();
  ctHHMM = drumH * 100 + drumM;
  ctUpdate();
}

function drumSet(which, val){
  if(which === 'H') drumH = val;
  else              drumM = val;
  renderDrums();
  ctHHMM = drumH * 100 + drumM;
  ctUpdate();
}

function renderDrums(){
  renderDrum('drumH', drumH, 24);
  renderDrum('drumM', drumM, 60);
}

function renderDrum(id, cur, total){
  const drum = document.getElementById(id);
  if(!drum) return;
  const items = drum.querySelectorAll('.ct-drum-item');
  items.forEach(el => {
    const v = parseInt(el.dataset.val);
    const dist = Math.abs(((v - cur + total) % total + total) % total);
    const distAlt = total - dist;
    const d = Math.min(dist, distAlt);
    el.classList.toggle('ct-drum-active', v === cur);
    el.classList.toggle('ct-drum-near', d === 1);
    el.classList.toggle('ct-drum-far', d >= 2);
    el.onclick = () => drumSet(id === 'drumH' ? 'H' : 'M', v);
  });
  // scroll drum so active item is centered
  const itemH = 36;
  drum.scrollTop = cur * itemH - drum.clientHeight/2 + itemH/2;
}



async function ctUpdate(){
  if(!ctCity || ctHHMM == null) return;
  if(!cur.riteId) cur.riteId = await goAddRite(TYPE_IDS.citytime);
  const r = await goUpdateRite(cur.riteId, [ctCity, ctHHMM]);
  if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
  document.getElementById('btnPerform').disabled = false;
}

async function showExistingEntropy(riteId){
  const e = await goGetEntropy();
  if(!e.rites) return;
  const found = e.rites.find(r=>r.id===riteId);
  if(found) updateEntropy(found.bits, e.total);
}

async function initString(editIndex){
  if(editIndex === null) return;
  const payload = await goGetRitePayload(completedRites[editIndex].id);
  if(!payload || !payload[0]) return;
  const input = document.getElementById('strIn');
  if(input){ input.value = payload[0]; onStr(payload[0]); }
}

async function initSequence(editIndex){
  if(editIndex === null){ renderSeq(); return; }
  const payload = await goGetRitePayload(completedRites[editIndex].id);
  cur.seqArr = payload && payload[0] ? [...payload[0]] : [];
  renderSeq();
  if(cur.seqArr.length > 0){
    goUpdateRite(cur.riteId, [cur.seqArr]).then(r=>{
      if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
    });
  }
}

async function initFile(editIndex){
  curFile    = null;
  curFileB64 = null;
  if(editIndex === null) return;
  const payload = await goGetRitePayload(completedRites[editIndex].id);
  if(!payload) return;
  curFileB64 = payload[0];
  setTimeout(()=>{
    const offsetEl = document.getElementById("fileOffset");
    const saltEl   = document.getElementById("fileMask");
    const labelEl  = document.getElementById("fileLoaded");
    const paramsEl = document.getElementById("fileParams");
    if(labelEl)  labelEl.textContent = payload[2] ? "✓ "+payload[2] : "";
    if(saltEl)   saltEl.value        = payload[1] || "";
    if(offsetEl){ offsetEl.value = payload[3] ? payload[3] : ""; offsetEl.setAttribute("readonly",""); }
    if(paramsEl) paramsEl.style.display = "block";
    document.getElementById("btnPerform").disabled = !(payload[1]||"").trim();
  }, 0);
  await showExistingEntropy(completedRites[editIndex].id);
}

async function onStr(val){
  cur.payload=val||null;
  document.getElementById('btnPerform').disabled=!cur.payload;
  if(!cur.riteId) cur.riteId=await goAddRite(TYPE_IDS.string);
  if(!cur.payload){
    // field cleared — update Go state and get real total
    const r=await goUpdateRite(cur.riteId,['']);
    updateEntropy(0, r.TotalBits||0);
    return;
  }
  const r=await goUpdateRite(cur.riteId,[val]);
  if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
}

async function seqAdd(idx){
  cur.seqArr.push(idx); cur.payload=[...cur.seqArr]; renderSeq();
  if(!cur.riteId) cur.riteId=await goAddRite(TYPE_IDS.sequence);
  const r=await goUpdateRite(cur.riteId,[cur.seqArr]);
  if(!r.error){updateEntropy(r.RiteBits, r.TotalBits);document.getElementById('btnPerform').disabled=false;}
}

async function seqRemove(pos){
  cur.seqArr.splice(pos,1); cur.payload=cur.seqArr.length?[...cur.seqArr]:null; renderSeq();
  if(!cur.payload){miniEntropy(0);document.getElementById('btnPerform').disabled=true;return;}
  const r=await goUpdateRite(cur.riteId,[cur.seqArr]);
  if(!r.error) updateEntropy(r.RiteBits, r.TotalBits);
}

function renderSeq(){
  const el=document.getElementById('seqChosen'); if(!el) return;
  el.innerHTML=cur.seqArr.length
    ?cur.seqArr.map((i,p)=>`<span class="seq-chip" onclick="seqRemove(${p})" title="${SEQ_SYMBOLS[i]}">${seqSymLabel(SEQ_SYMBOLS[i])}</span>`).join('')
    :`<span style="color:var(--muted);font-size:11px;padding:2px 4px;">Tap symbols below...</span>`;
}

let curFile     = null;  // File object from input
let curFileB64  = null;  // last slice b64 — reused when only salt changes

async function pickFile(){
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = async ()=>{
    const file = input.files[0];
    if(!file) return;
    curFile = file;
    document.getElementById('fileLoaded').textContent = `✓ ${file.name}`;
    document.getElementById('fileParams').style.display = 'block';
    const offsetEl = document.getElementById('fileOffset');
    if(offsetEl) offsetEl.removeAttribute('readonly');
    await sendFileToGo();
  };
  input.click();
}

async function onFileParams(){
  if(!curFile) return;
  await sendFileToGo();
}

async function onFileSalt(){
  // salt changed — reuse existing slice if file not reselected
  const maskEl  = document.getElementById('fileMask');
  const salt    = maskEl?.value || '';
  if(!cur.riteId) return;
  if(curFileB64){
    const offsetEl = document.getElementById('fileOffset');
    const rawVal   = offsetEl?.value.trim() || '';
    const offset   = rawVal === '' ? 0 : Math.max(0, Math.min(65535, parseInt(rawVal)||0));
    const res = await goUpdateRite(cur.riteId, [curFileB64, salt, curFile?.name||'', offset]);
    if(!res.error){
      updateEntropy(res.RiteBits, res.TotalBits);
      document.getElementById('btnPerform').disabled = !salt.trim();
    }
  }
}

async function sendFileToGo(){
  if(!curFile) return;
  const offsetEl = document.getElementById('fileOffset');
  const maskEl   = document.getElementById('fileMask');
  const rawVal   = offsetEl?.value.trim() || '';
  const offset   = rawVal === '' ? 0 : Math.max(0, Math.min(65535, parseInt(rawVal)||0));
  const salt     = maskEl?.value || '';

  const mid        = Math.floor(curFile.size / 2);
  const byteOffset = (mid + offset) % curFile.size;
  const needed     = byteOffset + 512;

  let slice;
  if(curFile.size >= needed){
    slice = new Uint8Array(await curFile.slice(byteOffset, byteOffset+512).arrayBuffer());
  } else {
    const full   = new Uint8Array(await curFile.arrayBuffer());
    const padded = new Uint8Array(needed);
    for(let i=0; i<needed; i++) padded[i] = full[i % full.length];
    slice = padded.slice(byteOffset, needed);
  }

  curFileB64 = btoa(String.fromCharCode(...slice));
  if(!cur.riteId) cur.riteId = await goAddRite(TYPE_IDS.file);
  const res = await goUpdateRite(cur.riteId, [curFileB64, salt, curFile.name, offset]);
  if(!res.error){
    updateEntropy(res.RiteBits, res.TotalBits);
    document.getElementById('btnPerform').disabled = !salt.trim();
  }
}


async function doPerform(){
  if(!cur.riteId){toast('No rite data');return;}

  // Force final UpdateRite before completing — guards against race condition
  // where user clicks Perform before the last async update finishes
  if(cur.type==='string'){
    const v = document.getElementById('strIn')?.value||'';
    if(v) await goUpdateRite(cur.riteId, [v]);
  } else if(cur.type==='sequence'){
    if(cur.seqArr.length) await goUpdateRite(cur.riteId, [cur.seqArr]);
  } else if(cur.type==='constellation'){
    await goUpdateRite(cur.riteId, [cur.rotation, Array.from(cur.starPath)]);
  } else if(cur.type==='citytime'){
    if(ctCity && ctHHMM != null) await goUpdateRite(cur.riteId, [ctCity, ctHHMM]);
  } else if(cur.type==='file'){
    if(curFilePath) await sendFileToGo();
    // if curFilePath is null — editing with existing payload, nothing to do
  } else if(cur.type==='runegrid'){
    const placements = [];
    rgGrid.forEach((r,i)=>{ if(r) placements.push([i, r.runeIdx]); });
    if(placements.length >= 1) await goUpdateRite(cur.riteId, placements);
  }

  const entropy = await goGetEntropy();
  const riteBits = entropy.rites ? (entropy.rites.find(r=>r.id===cur.riteId)?.bits||0) : 0;

  const riteData={
    id:cur.riteId,
    type:cur.type,
    bits: riteBits,
  };

  if(cur.editingIndex !== null){
    completedRites[cur.editingIndex]=riteData;
  } else {
    completedRites.push(riteData);
  }

  await recalcEntropy();
  showChoose();
}

async function doFinalize(){
  const r=await goFinalize();
  if(r.error){toast('Error: '+r.error);return;}
  finalKey=r.key; totalBits=r.totalBits;
  refreshSummary();
  document.getElementById('keySection').style.display='block';
  const chunks=finalKey.match(/.{1,8}/g)||[];
  document.getElementById('keyHex').innerHTML=chunks.map((c,i)=>`${c}${(i+1)%4===0?'<br>':' '}`).join('');

  // derive key files
  const kg = parse(await window.ritualDeriveKeys(finalKey));
  if(!kg.error){
    const files = [
      {name:'ed25519_private.pem.txt', data:kg.ed25519_private},
      {name:'ed25519_public.pem.txt',  data:kg.ed25519_public},
      {name:'ssh_private.txt',         data:kg.ssh_private},
      {name:'ssh_public.txt',          data:kg.ssh_public},
      {name:'aes256.txt',              data:kg.aes256+'\n'},
      {name:'bip39.txt',               data:kg.bip39_mnemonic+'\n'},
      {name:'ssl_private.pem.txt',     data:kg.ssl_private},
      {name:'ssl_csr.txt',             data:kg.ssl_csr},
    ];
    const linksEl = document.getElementById('keygenLinks');
    linksEl.innerHTML = files.map(f=>{
      const blob = new Blob([f.data], {type:'text/plain'});
      const url  = URL.createObjectURL(blob);
      return `<a href="${url}" download="${f.name}" style="font-size:11px;color:var(--gold);letter-spacing:.08em;text-decoration:none;opacity:.8;font-family:'Courier New',monospace">↓ ${f.name}</a>`;
    }).join('');
    document.getElementById('keygenSection').style.display='block';
  }
  setStep('Ritual complete');
  wb().innerHTML=`<div class="frame complete-frame">
    <svg width="60" height="60" viewBox="0 0 120 120" fill="none" style="opacity:.45;">
      <circle cx="60" cy="60" r="55" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="4 7"/>
      <polygon points="60,8 112,89 8,89" stroke="#c9a84c" stroke-width="0.5" fill="none"/>
      <polygon points="60,112 8,31 112,31" stroke="#c9a84c" stroke-width="0.5" fill="none"/>
      <circle cx="60" cy="60" r="3.5" fill="#c9a84c" opacity="0.8"/>
    </svg>
    <div style="font-family:var(--serif);font-size:15px;letter-spacing:.3em;color:var(--gold);">Key Derived</div>
    <div style="font-size:10px;color:var(--text2);letter-spacing:.12em;">${completedRites.length} rite${completedRites.length>1?'s':''} &nbsp;·&nbsp; ${Math.round(totalBits)} bits</div>
  </div>`;
}

async function deleteRite(index){
  const r=completedRites[index];
  const res=await window.ritualRemoveRite(r.id);
  completedRites.splice(index,1);
  await recalcEntropy();
}


async function recalcEntropy(){
  try {
    const r = parse(await window.ritualGetEntropy());
    totalBits = r.total;
  } catch(e) {
    totalBits = completedRites.reduce((s,x)=>s+x.bits+TYPE_EBITS,0);
  }
  refreshSummary();
}

function refreshSummary(){
  const bits=totalBits, color=eColor(bits), pct=Math.min((bits/128)*100,100);
  document.getElementById('entropyNum').textContent=Math.round(bits);
  document.getElementById('entropyNum').style.color=bits>0?color:'var(--text2)';
  document.getElementById('entropyVerdict').textContent=eVerdict(bits);
  document.getElementById('entropyVerdict').style.color=bits>0?color:'var(--text2)';
  document.getElementById('entropyFill').style.width=pct+'%';
  document.getElementById('entropyFill').style.background=color;
  const pc=['#8b2020','#7a6010','#1a6b3a','#2dba66'],pr=[[0,40],[40,80],[80,128],[128,Infinity]];
  pr.forEach(([lo,hi],i)=>{document.getElementById(`ep${i}`).style.background=(bits>=lo&&(hi===Infinity||bits<hi))?pc[i]:'var(--border)';});
  const list=document.getElementById('ritesList');
  list.querySelectorAll('.rite-row').forEach(e=>e.remove());
  document.getElementById('ritesEmpty').style.display=completedRites.length?'none':'block';
  completedRites.forEach((r,i)=>{
    const el=document.createElement('div');
    el.className='rite-row';
    el.innerHTML=`
      <span class="rite-row-n">${String(i+1).padStart(2,'0')}</span>
      <span class="rite-row-type" style="cursor:pointer;" onclick="showPerform('${r.type}',${i})">${r.type}</span>
      <span class="rite-row-bits">${Math.round(r.bits)} bit</span>
      <span class="rite-row-del" onclick="deleteRite(${i})" title="Remove">✕</span>`;
    list.appendChild(el);
  });
}

function updateEntropy(riteBits, totalBits_){
  // Per-rite bar in form
  const color=eColor(riteBits),pct=Math.min((riteBits/80)*100,100);
  const f=document.getElementById('miniFill'),v=document.getElementById('miniVal');
  if(f){f.style.width=pct+'%';f.style.background=color;}
  if(v){v.textContent=riteBits<1?'—':Math.round(riteBits)+' bit';v.style.color=color;}
  // Total in right panel
  if(totalBits_ !== undefined){
    totalBits=totalBits_;
    refreshSummary();
  }
}

function miniEntropy(bits){ updateEntropy(bits); }

function eColor(b){if(b>=128)return'#2dba66';if(b>=80)return'#1a9e52';if(b>=40)return'#c9a84c';if(b>0)return'#8b2020';return'var(--text2)';}
function eVerdict(b){if(b>=128)return'STRONG';if(b>=80)return'GOOD';if(b>=40)return'FAIR';if(b>0)return'WEAK';return'—';}

const parse=raw=>typeof raw==='string'?JSON.parse(raw):raw;
async function goUpdateRite(id,payload){return parse(await window.ritualUpdateRite(id,payload));}
async function goReadFileSlice(path,offset){return parse(await window.ritualReadFileSlice(path,offset));}
async function goReset(){return await window.ritualReset();}
async function goAddRite(tid){ const r = parse(await window.ritualAddRite(tid)); return r.id; }
async function goGetRitePayload(id){return parse(await window.ritualGetRitePayload(id));}
async function goFinalize(){return parse(await window.ritualFinalize());}
async function goGetEntropy(){return parse(await window.ritualGetEntropy());}

function wb(){return document.getElementById('workBody');}
function setStep(t){document.getElementById('workStep').textContent=t;}

async function resetAll(){
  await goReset();
  completedRites=[];totalBits=0;finalKey=null;cur={riteId:null,type:null,payload:null,seqArr:[],editingIndex:null};
  document.getElementById('keySection').style.display='none';
  document.getElementById('keygenSection').style.display='none';
  await recalcEntropy();
  const m=document.getElementById('screenMain'),s=document.getElementById('screenStart');
  m.classList.remove('visible');
  setTimeout(()=>{m.classList.remove('active');s.classList.add('active');setTimeout(()=>s.classList.add('visible'),20);},500);
}

function copyKey(){if(!finalKey)return;navigator.clipboard.writeText(finalKey).then(()=>toast('Key copied'));}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

setTimeout(()=>document.getElementById('screenStart').classList.add('visible'),50);
</script>
